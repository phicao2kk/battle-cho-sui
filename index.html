<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Battle Chó Sủi Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { border: 5px solid #333; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        /* Style cho ô nhập tên */
        .name-input {
            position: absolute;
            padding: 10px;
            font-size: 20px;
            border-radius: 5px;
            border: none;
            text-align: center;
            width: 200px;
        }
    </style>
</head>
<body>
<script>
let socket;
let mic;
let imgLeft, imgRight, bgImg;
let gameState = "START"; // START, WAITING, PLAYING, RESULT
let barRatio = 0.5; 
let timer = 30;
let mySide = "left";
let currentRoom = "";
let myVol = 0, opponentVol = 0;
let barkParticles = [];
const barkWords = ["Gâu!", "Gâuu!!", "Gâu Gâu!", "Woof!", "Bark!"];

// Biến cho tên
let inputElement;
let myName = "";
let opponentName = "Đối thủ";

function preload() {
    imgLeft = loadImage('https://i.ibb.co/v4nskhn8/Ch-tr-i.png');
    imgRight = loadImage('https://i.ibb.co/BK3VfYsG/Ch-ph-i.png');
    bgImg = loadImage('https://i.ibb.co/whMfv8qt/Background-game-ch.png');
}

function setup() {
    let cv = createCanvas(960, 540);
    
    // Tạo ô nhập tên bằng HTML/p5
    inputElement = createInput('');
    inputElement.attribute('placeholder', 'Nhập tên của bạn...');
    inputElement.addClass('name-input');
    // Căn giữa ô nhập liệu vào canvas
    inputElement.position(windowWidth/2 - 100, windowHeight/2 + 20);

    socket = io(); 
    mic = new p5.AudioIn();
    mic.start();

    socket.on('match_found', (data) => {
        currentRoom = data.room;
        mySide = data.side;
        opponentName = data.opponentName; // Nhận tên đối thủ từ server
        gameState = "PLAYING";
        barRatio = 0.5;
        timer = 30;
        inputElement.hide();
    });

    socket.on('opponent_volume', (data) => { opponentVol = data.vol; });
    imageMode(CENTER);
    textAlign(CENTER, CENTER);
}

function draw() {
    cursor(ARROW);
    image(bgImg, width/2, height/2, width, height);
    
    if (gameState === "START") drawStart();
    else if (gameState === "WAITING") drawWaiting();
    else if (gameState === "PLAYING") drawGame();
    else if (gameState === "RESULT") drawResult();
}

function drawStart() {
    fill(0, 180); rect(0, 0, width, height);
    fill(255); textSize(70); textStyle(BOLD); text("BATTLE CHÓ SỦI", width/2, height/2 - 80);
    fill(255, 220, 0); textSize(24); textStyle(NORMAL); text("Nhập tên và bắt đầu sủa!", width/2, height/2 - 20);
    
    inputElement.show();
    
    // Vẽ nút tìm trận bên dưới ô nhập tên
    drawButton("TÌM ĐỐI THỦ", width/2, height/2 + 110, 250, 60, color(46, 204, 113), color(39, 174, 96));
}

function drawWaiting() {
    inputElement.hide();
    fill(0, 200); rect(0, 0, width, height);
    fill(255); textSize(30); text("Đang chờ đối thủ...", width/2, height/2);
    push(); translate(width/2, height/2 + 60); rotate(frameCount * 0.1); stroke(255); noFill(); arc(0, 0, 40, 40, 0, PI); pop();
}

function drawGame() {
    myVol = mic.getLevel();
    socket.emit('send_volume', { room: currentRoom, vol: myVol });

    let pushForce = (myVol - opponentVol) * 0.1;
    if (mySide === "right") pushForce = -pushForce; 
    barRatio += pushForce;
    barRatio = constrain(barRatio, 0.05, 0.95);

    drawHandDrawnBar(width/2 - 250, 30, 500, 35, barRatio);
    fill(255); stroke(0); strokeWeight(4); textSize(60); text(ceil(timer), width/2, 110);

    let xL = 260 + (barRatio - 0.5) * 200;
    let xR = 720 + (barRatio - 0.5) * 200;

    // Hiển thị chó và tên
    let leftLabel = (mySide === "left") ? myName : opponentName;
    let rightLabel = (mySide === "right") ? myName : opponentName;

    // Vẽ chó trái
    push();
    image(imgLeft, xL, 360, 160 + (mySide==="left"?myVol:opponentVol)*150, 160 + (mySide==="left"?myVol:opponentVol)*150);
    fill(255); stroke(0); strokeWeight(3); textSize(25);
    text(leftLabel, xL, 460); // Tên ở dưới chân
    if(mySide === "left") { fill(255, 255, 0); text("(BẠN)", xL, 490); }
    pop();

    // Vẽ chó phải
    push();
    image(imgRight, xR, 360, 160 + (mySide==="right"?myVol:opponentVol)*150, 160 + (mySide==="right"?myVol:opponentVol)*150);
    fill(255); stroke(0); strokeWeight(3); textSize(25);
    text(rightLabel, xR, 460);
    if(mySide === "right") { fill(255, 255, 0); text("(BẠN)", xR, 490); }
    pop();

    // Hiệu ứng sủa (như cũ)
    if (mySide === "left" && myVol > 0.1 && frameCount % 2 == 0) barkParticles.push(new BarkParticle(xL, 300, true));
    if (mySide === "right" && myVol > 0.1 && frameCount % 2 == 0) barkParticles.push(new BarkParticle(xR, 300, false));
    if (opponentVol > 0.1 && frameCount % 2 == 0) barkParticles.push(new BarkParticle(mySide === "left" ? xR : xL, 300, mySide === "right"));
    barkParticles.forEach((p, i) => { p.update(); p.display(); if(p.isDead()) barkParticles.splice(i,1); });

    if (frameCount % 60 == 0 && timer > 0) timer--;
    if (timer <= 0) gameState = "RESULT";
}

function drawResult() {
    fill(0, 220); rect(0, 0, width, height);
    let win = (mySide === "left" && barRatio > 0.5) || (mySide === "right" && barRatio < 0.5);
    fill(win ? color(46, 204, 113) : color(231, 76, 60));
    textSize(80); text(win ? "CHIẾN THẮNG! 🏆" : "THẤT BẠI... 💀", width/2, height/2 - 50);
    drawButton("CHƠI LẠI", width/2, height/2 + 80, 200, 60, color(52, 152, 219), color(41, 128, 185));
}

// Các hàm bổ trợ (drawButton, drawHandDrawnBar, getWobblyPath, BarkParticle...) giữ nguyên từ bản trước
function drawButton(txt, x, y, w, h, c1, c2) {
    let hov = mouseX > x-w/2 && mouseX < x+w/2 && mouseY > y-h/2 && mouseY < y+h/2;
    fill(hov ? c2 : c1); stroke(255); strokeWeight(3); rect(x-w/2, y-h/2, w, h, 10);
    fill(255); noStroke(); textSize(24); text(txt, x, y);
    if (hov) cursor(HAND); return hov;
}

function mousePressed() {
    if (gameState === "START" || gameState === "RESULT") {
        // Kiểm tra bấm nút (Toạ độ nút tìm trận/chơi lại)
        let btnY = (gameState === "START") ? height/2 + 110 : height/2 + 80;
        if (mouseX > width/2-125 && mouseX < width/2+125 && mouseY > btnY-30 && mouseY < btnY+30) {
            myName = inputElement.value() || "Vô danh";
            userStartAudio(); 
            socket.emit('find_match', { name: myName }); // Gửi tên lên server
            gameState = "WAITING";
        }
    }
}

class BarkParticle {
    constructor(x, y, isLeft) {
        this.x = x; this.y = y; this.txt = random(barkWords);
        this.vx = random(isLeft ? -6 : 2, isLeft ? -2 : 6); this.vy = random(-7, -3); 
        this.alpha = 255; this.size = random(20, 50); this.angle = random(-0.5, 0.5);
        this.color = random() > 0.5 ? color(255, 50, 0) : color(255, 215, 0);
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 7; }
    display() { push(); translate(this.x, this.y); rotate(this.angle); fill(red(this.color), green(this.color), blue(this.color), this.alpha); stroke(255, this.alpha); strokeWeight(2); textSize(this.size); text(this.txt, 0, 0); pop(); }
    isDead() { return this.alpha <= 0; }
}

function getWobblyPath(w, h) {
    let pts = [];
    for (let i = 0; i <= w; i += 20) pts.push({x: i, y: map(noise(i*0.05, frameCount*0.05), 0, 1, -2, 2)});
    pts.push({x: w, y: h});
    for (let i = w; i >= 0; i -= 20) pts.push({x: i, y: h + map(noise(i*0.05, frameCount*0.05+100), 0, 1, -2, 2)});
    pts.push({x: 0, y: 0});
    return pts;
}

function drawHandDrawnBar(x, y, w, h, ratio) {
    push(); translate(x, y);
    let path = getWobblyPath(w, h);
    let splitX = w * ratio;
    push();
    drawingContext.beginPath();
    drawingContext.moveTo(path[0].x, path[0].y);
    for (let p of path) drawingContext.lineTo(p.x, p.y);
    drawingContext.closePath();
    drawingContext.clip(); 
    noStroke(); fill(230, 50, 50); rect(0, -10, splitX, h+20); fill(70, 120, 230); rect(splitX, -10, w-splitX, h+20);
    stroke(255, 150); drawingContext.setLineDash([5, 5]); line(w/2, -5, w/2, h+5);
    pop();
    stroke(60, 40, 20); strokeWeight(4); noFill(); beginShape(); path.forEach(p => vertex(p.x, p.y)); endShape(CLOSE);
    push(); translate(splitX, h/2); stroke(0); fill(255); ellipse(0, 0, 26, 26); fill(0); ellipse(0, 0, 8, 8); pop();
    pop();
}
</script>
</body>
</html>
