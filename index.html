<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Battle Chó Sủi Online - Voice Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { border: 5px solid #333; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .game-input { position: absolute; padding: 10px; font-size: 18px; border-radius: 5px; border: 2px solid #555; text-align: center; width: 180px; outline: none; background: white; color: black; }
    </style>
</head>
<body>    
<script>
let socket, mic, imgLeft, imgRight, bgImg;
let gameState = "START"; 
let barRatio = 0.5, timer = 30, mySide = "left", currentRoom = "", myVol = 0, opponentVol = 0;
let barkParticles = [];
const barkWords = ["Gâu!", "Gâuu!!", "Woof!", "Bark!"];

let inputName, inputCode;
let myName = "", opponentName = "Đối thủ", privateRoomCode = "";

// Các biến cho hệ thống Voice
let audioContext;
let processor;

function preload() {
    imgLeft = loadImage('https://i.ibb.co/v4nskhn8/Ch-tr-i.png');
    imgRight = loadImage('https://i.ibb.co/BK3VfYsG/Ch-ph-i.png');
    bgImg = loadImage('https://i.ibb.co/whMfv8qt/Background-game-ch.png');
}

function setup() {
    createCanvas(960, 540);
    socket = io(); 
    mic = new p5.AudioIn(); mic.start();

    inputName = createInput(''); inputName.addClass('game-input');
    inputName.attribute('placeholder', 'Tên của bạn...');
    inputCode = createInput(''); inputCode.addClass('game-input');
    inputCode.attribute('placeholder', 'Mã 6 số...');
    inputCode.hide();

    socket.on('room_created', (data) => { 
        privateRoomCode = data.code; 
        gameState = "WAITING"; 
    });

    socket.on('match_found', (data) => {
        currentRoom = data.room; 
        mySide = data.side; 
        opponentName = data.opponentName;
        barkParticles = [];
        gameState = "PLAYING"; 
        barRatio = 0.5; 
        timer = 30;
        inputName.hide(); 
        inputCode.hide();
        
        // Bắt đầu truyền âm thanh khi vào trận
        initVoiceStream();
    });

    socket.on('opponent_volume', (data) => { opponentVol = data.vol; });
    
    // Nhận âm thanh từ đối thủ và phát lại
    socket.on('opponent_voice', (data) => {
        if (gameState === "PLAYING" && audioContext) {
            let buffer = new Float32Array(data.buffer);
            playAudioBuffer(buffer);
        }
    });

    socket.on('error_msg', (msg) => { alert(msg); gameState = "START"; });

    textAlign(CENTER, CENTER);
    imageMode(CENTER);
}

// --- HỆ THỐNG VOICE CHAT ---

function initVoiceStream() {
    // Khởi tạo AudioContext (yêu cầu tương tác người dùng - đã có qua button)
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Tạo bộ xử lý âm thanh
    processor = audioContext.createScriptProcessor(2048, 1, 1);
    
    // Kết nối mic vào bộ xử lý
    let source = audioContext.createMediaStreamSource(mic.stream);
    source.connect(processor);
    processor.connect(audioContext.destination);

    processor.onaudioprocess = (e) => {
        if (gameState === "PLAYING") {
            let inputData = e.inputBuffer.getChannelData(0);
            // Chỉ gửi khi có tiếng sủa đủ lớn (>0.02) để tránh lag và echo
            if (myVol > 0.02) {
                socket.emit('audio_stream', { 
                    room: currentRoom, 
                    buffer: Array.from(inputData) 
                });
            }
        }
    };
}

function playAudioBuffer(bufferData) {
    if (!audioContext) return;
    let audioBuffer = audioContext.createBuffer(1, bufferData.length, audioContext.sampleRate);
    audioBuffer.copyToChannel(bufferData, 0);
    let source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioContext.destination);
    source.start();
}

// --- LOGIC VẼ VÀ GAME ---

function draw() {
    background(20); 
    if (bgImg) image(bgImg, width/2, height/2, width, height);

    let cvX = (windowWidth - width) / 2;
    let cvY = (windowHeight - height) / 2;
    inputName.position(cvX + width/2 - 100, cvY + height/2 - 20);
    inputCode.position(cvX + width/2 - 100, cvY + height/2 + 30);

    if (gameState === "START") drawStart();
    else if (gameState === "WAITING") drawWaiting();
    else if (gameState === "INPUT_CODE") drawInputCode();
    else if (gameState === "PLAYING") drawGame();
    else if (gameState === "RESULT") drawResult();
}

function drawStart() {
    fill(0, 220); rect(0, 0, width, height);
    fill(255); textSize(70); textStyle(BOLD); text("BATTLE CHÓ SỦI", width/2, height/2 - 100);
    fill(255, 200, 0); textSize(20); text("NÊN ĐEO TAI NGHE ĐỂ KHÔNG BỊ HÚ TIẾNG", width/2, height/2 - 150);
    inputName.show(); inputCode.hide();
    drawButton("TÌM NGẪU NHIÊN", width/2 - 220, height/2 + 100, 200, 50, color(46, 204, 113), color(39, 174, 96));
    drawButton("TẠO PHÒNG", width/2, height/2 + 100, 180, 50, color(155, 89, 182), color(142, 68, 173));
    drawButton("VÀO PHÒNG", width/2 + 210, height/2 + 100, 180, 50, color(52, 152, 219), color(41, 128, 185));
}

function drawWaiting() {
    inputName.hide();
    fill(0, 230); rect(0, 0, width, height);
    fill(255); textSize(30);
    if (privateRoomCode) {
        text("MÃ PHÒNG:", width/2, height/2 - 30);
        textSize(65); fill(255, 255, 0); text(privateRoomCode, width/2, height/2 + 40);
    } else {
        text("Đang tìm đối thủ ngẫu nhiên...", width/2, height/2);
    }
    drawButton("HỦY", width/2, height/2 + 180, 150, 45, color(100), color(80));
}

function drawInputCode() {
    fill(0, 230); rect(0, 0, width, height);
    fill(255); textSize(32); text("NHẬP MÃ PHÒNG", width/2, height/2 - 60);
    inputCode.show();
    drawButton("XÁC NHẬN", width/2, height/2 + 120, 180, 50, color(230, 126, 34), color(211, 84, 0));
    drawButton("QUAY LẠI", 80, 40, 120, 40, color(100), color(80));
}

function drawGame() {
    myVol = mic.getLevel();
    socket.emit('send_volume', { room: currentRoom, vol: myVol });

    let pushForce = (myVol - opponentVol) * 0.15;
    if (mySide === "right") pushForce = -pushForce; 
    barRatio = constrain(barRatio + pushForce, 0.05, 0.95);

    drawHandDrawnBar(width/2 - 250, 40, 500, 35, barRatio);
    fill(255); stroke(0); strokeWeight(4); textSize(55); text(ceil(timer), width/2, 115);

    let xL = 260 + (barRatio - 0.5) * 240;
    let xR = 700 + (barRatio - 0.5) * 240;

    // Chó
    let sL = 160 + (mySide==="left"?myVol:opponentVol)*180;
    image(imgLeft, xL, 360, sL, sL);
    let sR = 160 + (mySide==="right"?myVol:opponentVol)*180;
    image(imgRight, xR, 360, sR, sR);

    // Tên & Icon Loa
    fill(255); stroke(0); strokeWeight(3); textSize(24);
    text(mySide==="left"?myName:opponentName, xL, 470);
    text(mySide==="right"?myName:opponentName, xR, 470);
    
    // Hiển thị icon loa khi đối phương đang nói
    if (opponentVol > 0.05) {
        textSize(25); text("🔊", (mySide==="left"?xR:xL), 420);
    }

    fill(255, 255, 0); noStroke(); textSize(18);
    text("(BẠN)", mySide==="left"?xL:xR, 500);

    // Hạt sủa
    if (myVol > 0.1 && frameCount % 2 == 0) {
        barkParticles.push(new BarkParticle(mySide==="left"?xL:xR, 320, mySide==="left"));
    }
    if (opponentVol > 0.1 && frameCount % 2 == 0) {
        barkParticles.push(new BarkParticle(mySide==="left"?xR:xL, 320, mySide==="right"));
    }
    
    for (let i = barkParticles.length - 1; i >= 0; i--) {
        barkParticles[i].update(); barkParticles[i].display();
        if (barkParticles[i].isDead()) barkParticles.splice(i, 1);
    }

    if (frameCount % 60 == 0 && timer > 0) timer--;
    if (timer <= 0) gameState = "RESULT";
}

function drawResult() {
    // Ngắt stream khi kết thúc trận
    if (processor) { processor.disconnect(); processor = null; }
    
    fill(0, 240); rect(0, 0, width, height);
    let win = (mySide === "left" && barRatio > 0.5) || (mySide === "right" && barRatio < 0.5);
    fill(win ? "#2ecc71" : "#e74c3c"); textSize(80); text(win ? "THẮNG! 🏆" : "THUA! 💀", width/2, height/2 - 50);
    drawButton("MENU", width/2, height/2 + 100, 200, 60, color(52, 152, 219), color(41, 128, 185));
}

function drawButton(txt, x, y, w, h, c1, c2) {
    let hov = mouseX > x-w/2 && mouseX < x+w/2 && mouseY > y-h/2 && mouseY < y+h/2;
    push(); translate(x, y);
    fill(hov ? (c2 || 100) : (c1 || 150)); stroke(255); strokeWeight(3); rect(-w/2, -h/2, w, h, 10);
    fill(255); noStroke(); textStyle(BOLD); textSize(18); text(txt, 0, 0);
    pop();
    if (hov) cursor(HAND); return hov;
}

function mousePressed() {
    myName = inputName.value() || "Chó Sủa";
    if (gameState === "START") {
        if (mouseX > width/2-320 && mouseX < width/2-120 && mouseY > height/2+75 && mouseY < height/2+125) {
            userStartAudio(); socket.emit('find_match', { name: myName }); gameState = "WAITING";
        } else if (mouseX > width/2-90 && mouseX < width/2+90 && mouseY > height/2+75 && mouseY < height/2+125) {
            userStartAudio(); socket.emit('create_private', { name: myName });
        } else if (mouseX > width/2+120 && mouseX < width/2+300 && mouseY > height/2+75 && mouseY < height/2+125) {
            gameState = "INPUT_CODE";
        }
    } else if (gameState === "WAITING") {
        if (mouseX > width/2-75 && mouseX < width/2+75 && mouseY > height/2+155 && mouseY < height/2+205) {
            gameState = "START"; privateRoomCode = "";
        }
    } else if (gameState === "INPUT_CODE") {
        if (mouseX > width/2-90 && mouseX < width/2+90 && mouseY > height/2+95 && mouseY < height/2+145) {
            let code = inputCode.value();
            if(code.length === 6) { userStartAudio(); socket.emit('join_private', { name: myName, code: code }); }
        } else if (mouseX > 20 && mouseX < 140 && mouseY > 20 && mouseY < 60) gameState = "START";
    } else if (gameState === "RESULT") {
        if (mouseX > width/2-100 && mouseX < width/2+100 && mouseY > height/2+70 && mouseY < height/2+130) gameState = "START";
    }
}

class BarkParticle {
    constructor(x, y, isLeft) {
        this.x = x; this.y = y; this.txt = random(barkWords);
        this.vx = random(isLeft ? -7 : 2, isLeft ? -2 : 7); this.vy = random(-8, -4); 
        this.alpha = 255; this.size = random(20, 45); this.angle = random(-0.4, 0.4);
        this.color = random() > 0.5 ? color(255, 50, 0) : color(255, 215, 0);
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 10; }
    display() { push(); translate(this.x, this.y); rotate(this.angle); fill(red(this.color), green(this.color), blue(this.color), this.alpha); stroke(255, this.alpha); strokeWeight(2); textSize(this.size); text(this.txt, 0, 0); pop(); }
    isDead() { return this.alpha <= 0; }
}

function getWobblyPath(w, h) {
    let pts = [];
    for (let i = 0; i <= w; i += 20) pts.push({x: i, y: map(noise(i*0.05, frameCount*0.05), 0, 1, -2, 2)});
    pts.push({x: w, y: h});
    for (let i = w; i >= 0; i -= 20) pts.push({x: i, y: h + map(noise(i*0.05, frameCount*0.05+100), 0, 1, -2, 2)});
    pts.push({x: 0, y: 0});
    return pts;
}

function drawHandDrawnBar(x, y, w, h, ratio) {
    push(); translate(x, y);
    let path = getWobblyPath(w, h);
    let splitX = w * ratio;
    push();
    drawingContext.beginPath();
    drawingContext.moveTo(path[0].x, path[0].y);
    for (let p of path) drawingContext.lineTo(p.x, p.y);
    drawingContext.closePath();
    drawingContext.clip(); 
    noStroke(); fill(230, 50, 50); rect(0, -10, splitX, h+20); fill(70, 120, 230); rect(splitX, -10, w-splitX, h+20);
    stroke(255, 180); drawingContext.setLineDash([5, 5]); line(w/2, -5, w/2, h+5);
    pop();
    stroke(60, 40, 20); strokeWeight(4); noFill(); beginShape(); path.forEach(p => vertex(p.x, p.y)); endShape(CLOSE);
    push(); translate(splitX, h/2); stroke(0); fill(255); ellipse(0, 0, 26, 26); fill(0); ellipse(0, 0, 8, 8); pop();
    pop();
}
</script>
</body>
</html>
